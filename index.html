<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Photo Editor Pro</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com">
    </script>
    <!-- React + ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js">
    </script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js">
    </script>
    <!-- Babel standalone for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js">
    </script>
    <style>
        /* Custom scrollbar for a polished look */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 8px;
        }
        ::-webkit-scrollbar-thumb {
            background: #f97316;
            border-radius: 8px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #ea580c;
        }
        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            height: 6px;
            border-radius: 4px;
            background: #e5e7eb;
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #f97316;
            cursor: pointer;
            transition: 0.15s;
            border: 2px solid white;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
        }
        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.1);
            background: #ea580c;
        }
        input[type="range"]::-moz-range-thumb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #f97316;
            cursor: pointer;
            border: 2px solid white;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
        }
        input[type="range"]:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .fade-in {
            animation: fadeIn 0.25s ease-out;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        /* Glass-morphism card */
        .glass {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        const {
            useState,
            useRef,
            useCallback,
            useEffect
        } = React;

        // ============================================================
        // PhotoEditorPro - Full-featured photo editor with canvas
        // ============================================================
        function PhotoEditorPro() {
            // ----- Refs -----
            const canvasRef = useRef(null);
            const fileInputRef = useRef(null);

            // ----- State -----
            const [image, setImage] = useState(null); // HTMLImageElement
            const [imageLoaded, setImageLoaded] = useState(false);
            const [history, setHistory] = useState([]);
            const [historyIndex, setHistoryIndex] = useState(-1);
            const [isProcessing, setIsProcessing] = useState(false);

            // Filter states
            const [brightness, setBrightness] = useState(0);
            const [contrast, setContrast] = useState(0);
            const [saturation, setSaturation] = useState(0);
            const [blurRadius, setBlurRadius] = useState(0);
            const [grayscale, setGrayscale] = useState(false);
            const [sepia, setSepia] = useState(false);
            const [invert, setInvert] = useState(false);
            const [emboss, setEmboss] = useState(false);
            const [sharpen, setSharpen] = useState(false);

            // Rotation & flip
            const [rotation, setRotation] = useState(0); // 0, 90, 180, 270
            const [flipH, setFlipH] = useState(false);
            const [flipV, setFlipV] = useState(false);

            // UI
            const [activeTab, setActiveTab] = useState("filters"); // "filters" | "adjust" | "rotate"
            const [exportFormat, setExportFormat] = useState("png");

            // ----- Helper: Save current canvas state to history -----
            const saveToHistory = useCallback(() => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext("2d");
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                setHistory((prev) => {
                    const newHistory = prev.slice(0, historyIndex + 1);
                    newHistory.push(imageData);
                    if (newHistory.length > 30) newHistory.shift();
                    return newHistory;
                });
                setHistoryIndex((prev) => {
                    const newIndex = Math.min(prev + 1, 29);
                    return Math.min(newIndex, history.length);
                });
            }, [historyIndex, history.length]);

            // ----- Helper: Load from history -----
            const loadFromHistory = useCallback(
                (index) => {
                    if (index < 0 || index >= history.length) return;
                    const canvas = canvasRef.current;
                    if (!canvas) return;
                    const ctx = canvas.getContext("2d");
                    const imageData = history[index];
                    ctx.putImageData(imageData, 0, 0);
                    setHistoryIndex(index);
                },
                [history]
            );

            // ----- Undo / Redo -----
            const undo = useCallback(() => {
                if (historyIndex > 0) {
                    loadFromHistory(historyIndex - 1);
                }
            }, [historyIndex, loadFromHistory]);

            const redo = useCallback(() => {
                if (historyIndex < history.length - 1) {
                    loadFromHistory(historyIndex + 1);
                }
            }, [historyIndex, history.length, loadFromHistory]);

            // ----- Apply filters to canvas -----
            const applyFilters = useCallback(
                (
                    imgData,
                    b = brightness,
                    c = contrast,
                    s = saturation,
                    blur = blurRadius,
                    gray = grayscale,
                    sep = sepia,
                    inv = invert,
                    emb = emboss,
                    sharp = sharpen
                ) => {
                    const data = imgData.data;
                    const width = imgData.width;
                    const height = imgData.height;

                    const hasFilters =
                        b !== 0 ||
                        c !== 0 ||
                        s !== 0 ||
                        blur > 0 ||
                        gray ||
                        sep ||
                        inv ||
                        emb ||
                        sharp;

                    if (!hasFilters) return imgData;

                    const originalData = new Uint8ClampedArray(data);

                    // ---- Pixel-level filters ----
                    for (let i = 0; i < data.length; i += 4) {
                        let r = originalData[i];
                        let g = originalData[i + 1];
                        let bVal = originalData[i + 2];
                        let a = originalData[i + 3];

                        if (gray) {
                            const grayVal = 0.299 * r + 0.587 * g + 0.114 * bVal;
                            r = g = bVal = grayVal;
                        }

                        if (sep) {
                            const tr = r,
                                tg = g,
                                tb = bVal;
                            r = Math.min(255, 0.393 * tr + 0.769 * tg + 0.189 * tb);
                            g = Math.min(255, 0.349 * tr + 0.686 * tg + 0.168 * tb);
                            bVal = Math.min(255, 0.272 * tr + 0.534 * tg + 0.131 * tb);
                        }

                        if (inv) {
                            r = 255 - r;
                            g = 255 - g;
                            bVal = 255 - bVal;
                        }

                        if (b !== 0) {
                            const val = (b / 100) * 255;
                            r = Math.min(255, Math.max(0, r + val));
                            g = Math.min(255, Math.max(0, g + val));
                            bVal = Math.min(255, Math.max(0, bVal + val));
                        }

                        if (c !== 0) {
                            const factor = (c + 100) / 100;
                            r = Math.min(255, Math.max(0, (r - 128) * factor + 128));
                            g = Math.min(255, Math.max(0, (g - 128) * factor + 128));
                            bVal = Math.min(255, Math.max(0, (bVal - 128) * factor + 128));
                        }

                        if (s !== 0) {
                            const grayVal = 0.299 * r + 0.587 * g + 0.114 * bVal;
                            const factor = (s + 100) / 100;
                            r = Math.min(255, Math.max(0, grayVal + (r - grayVal) * factor));
                            g = Math.min(255, Math.max(0, grayVal + (g - grayVal) * factor));
                            bVal = Math.min(255, Math.max(0, grayVal + (bVal - grayVal) * factor));
                        }

                        data[i] = r;
                        data[i + 1] = g;
                        data[i + 2] = bVal;
                        data[i + 3] = a;
                    }

                    // ---- Convolution filters (blur, emboss, sharpen) ----
                    if (blur > 0 || emb || sharp) {
                        const kernelSize = blur > 0 ? Math.min(Math.round(blur / 2) * 2 + 1, 9) : 3;
                        const half = Math.floor(kernelSize / 2);

                        let kernel = [];
                        let divisor = 1;

                        if (emb) {
                            kernel = [
                                [-2, -1, 0],
                                [-1, 1, 1],
                                [0, 1, 2]
                            ];
                            divisor = 1;
                        } else if (sharp) {
                            kernel = [
                                [0, -1, 0],
                                [-1, 5, -1],
                                [0, -1, 0]
                            ];
                            divisor = 1;
                        } else if (blur > 0) {
                            const size = kernelSize;
                            const val = 1 / (size * size);
                            kernel = Array.from({ length: size }, () =>
                                Array.from({ length: size }, () => val)
                            );
                            divisor = 1;
                        }

                        if (kernel.length > 0) {
                            const size = kernel.length;
                            const halfK = Math.floor(size / 2);
                            const result = new Uint8ClampedArray(data);

                            for (let y = 0; y < height; y++) {
                                for (let x = 0; x < width; x++) {
                                    let rSum = 0,
                                        gSum = 0,
                                        bSum = 0;
                                    let weightSum = 0;

                                    for (let ky = 0; ky < size; ky++) {
                                        for (let kx = 0; kx < size; kx++) {
                                            const px = Math.min(width - 1, Math.max(0, x + kx - halfK));
                                            const py = Math.min(height - 1, Math.max(0, y + ky - halfK));
                                            const idx = (py * width + px) * 4;
                                            const kVal = kernel[ky][kx];

                                            rSum += result[idx] * kVal;
                                            gSum += result[idx + 1] * kVal;
                                            bSum += result[idx + 2] * kVal;
                                            weightSum += kVal;
                                        }
                                    }

                                    const idx = (y * width + x) * 4;
                                    if (weightSum !== 0) {
                                        data[idx] = Math.min(255, Math.max(0, rSum / weightSum));
                                        data[idx + 1] = Math.min(255, Math.max(0, gSum / weightSum));
                                        data[idx + 2] = Math.min(255, Math.max(0, bSum / weightSum));
                                    }
                                }
                            }
                        }
                    }

                    return imgData;
                },
                [brightness, contrast, saturation, blurRadius, grayscale, sepia, invert, emboss, sharpen]
            );

            // ----- Render canvas with current settings -----
            const renderCanvas = useCallback(() => {
                const canvas = canvasRef.current;
                if (!canvas || !image) return;

                const ctx = canvas.getContext("2d");
                const w = image.width;
                const h = image.height;

                canvas.width = w;
                canvas.height = h;

                ctx.clearRect(0, 0, w, h);
                ctx.save();

                const rad = (rotation * Math.PI) / 180;
                ctx.translate(w / 2, h / 2);
                ctx.rotate(rad);
                ctx.scale(flipH ? -1 : 1, flipV ? -1 : 1);
                ctx.drawImage(image, -w / 2, -h / 2, w, h);
                ctx.restore();

                const imageData = ctx.getImageData(0, 0, w, h);
                const filteredData = applyFilters(imageData);
                ctx.putImageData(filteredData, 0, 0);

                if (history.length === 0) {
                    const initialState = ctx.getImageData(0, 0, w, h);
                    setHistory([initialState]);
                    setHistoryIndex(0);
                }
            }, [image, rotation, flipH, flipV, applyFilters, history.length]);

            // ----- Apply current filters and save to history -----
            const applyAndSave = useCallback(() => {
                const canvas = canvasRef.current;
                if (!canvas || !image) return;

                const ctx = canvas.getContext("2d");
                const w = image.width;
                const h = image.height;

                ctx.clearRect(0, 0, w, h);
                ctx.save();
                const rad = (rotation * Math.PI) / 180;
                ctx.translate(w / 2, h / 2);
                ctx.rotate(rad);
                ctx.scale(flipH ? -1 : 1, flipV ? -1 : 1);
                ctx.drawImage(image, -w / 2, -h / 2, w, h);
                ctx.restore();

                const imageData = ctx.getImageData(0, 0, w, h);
                const filteredData = applyFilters(imageData);
                ctx.putImageData(filteredData, 0, 0);

                const newState = ctx.getImageData(0, 0, w, h);
                setHistory((prev) => {
                    const newHistory = prev.slice(0, historyIndex + 1);
                    newHistory.push(newState);
                    if (newHistory.length > 30) newHistory.shift();
                    return newHistory;
                });
                setHistoryIndex((prev) => Math.min(prev + 1, 29));
            }, [image, rotation, flipH, flipV, applyFilters, historyIndex]);

            // ----- Handle image upload -----
            const handleImageUpload = useCallback((e) => {
                const file = e.target.files?.[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        setImage(img);
                        setImageLoaded(true);
                        setHistory([]);
                        setHistoryIndex(-1);
                        setBrightness(0);
                        setContrast(0);
                        setSaturation(0);
                        setBlurRadius(0);
                        setGrayscale(false);
                        setSepia(false);
                        setInvert(false);
                        setEmboss(false);
                        setSharpen(false);
                        setRotation(0);
                        setFlipH(false);
                        setFlipV(false);
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
                e.target.value = "";
            }, []);

            // ----- Trigger file input -----
            const triggerUpload = useCallback(() => {
                fileInputRef.current?.click();
            }, []);

            // ----- Export image -----
            const exportImage = useCallback(() => {
                const canvas = canvasRef.current;
                if (!canvas) return;

                const format = exportFormat === "png" ? "image/png" : "image/jpeg";
                const quality = exportFormat === "jpeg" ? 0.92 : 1;
                const link = document.createElement("a");
                link.download = `photo-editor.${exportFormat}`;
                link.href = canvas.toDataURL(format, quality);
                link.click();
            }, [exportFormat]);

            // ----- Reset all filters -----
            const resetFilters = useCallback(() => {
                setBrightness(0);
                setContrast(0);
                setSaturation(0);
                setBlurRadius(0);
                setGrayscale(false);
                setSepia(false);
                setInvert(false);
                setEmboss(false);
                setSharpen(false);
                setRotation(0);
                setFlipH(false);
                setFlipV(false);
            }, []);

            // ----- Render canvas when image or settings change -----
            useEffect(() => {
                if (!image || !imageLoaded) return;
                renderCanvas();
                const canvas = canvasRef.current;
                if (canvas && history.length === 0) {
                    const ctx = canvas.getContext("2d");
                    const state = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    setHistory([state]);
                    setHistoryIndex(0);
                }
            }, [image, imageLoaded, renderCanvas, history.length]);

            // Re-apply when filter settings change (live preview)
            useEffect(() => {
                if (!image || !imageLoaded || history.length === 0 || isProcessing) return;
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext("2d");
                const w = image.width;
                const h = image.height;

                ctx.clearRect(0, 0, w, h);
                ctx.save();
                const rad = (rotation * Math.PI) / 180;
                ctx.translate(w / 2, h / 2);
                ctx.rotate(rad);
                ctx.scale(flipH ? -1 : 1, flipV ? -1 : 1);
                ctx.drawImage(image, -w / 2, -h / 2, w, h);
                ctx.restore();

                const imageData = ctx.getImageData(0, 0, w, h);
                const filteredData = applyFilters(imageData);
                ctx.putImageData(filteredData, 0, 0);
            }, [
                brightness,
                contrast,
                saturation,
                blurRadius,
                grayscale,
                sepia,
                invert,
                emboss,
                sharpen,
                rotation,
                flipH,
                flipV,
                image,
                imageLoaded,
                history,
                applyFilters,
                isProcessing,
            ]);

            // ----- Toggle filter (saves to history) -----
            const toggleFilter = useCallback(
                (filter, value) => {
                    setIsProcessing(true);
                    if (filter === "grayscale") setGrayscale(value);
                    else if (filter === "sepia") setSepia(value);
                    else if (filter === "invert") setInvert(value);
                    else if (filter === "emboss") setEmboss(value);
                    else if (filter === "sharpen") setSharpen(value);
                    setTimeout(() => {
                        applyAndSave();
                        setIsProcessing(false);
                    }, 50);
                },
                [applyAndSave]
            );

            // ----- Handle slider change (live preview + save on end) -----
            const handleSliderChange = useCallback(
                (slider, value) => {
                    setIsProcessing(true);
                    if (slider === "brightness") setBrightness(value);
                    else if (slider === "contrast") setContrast(value);
                    else if (slider === "saturation") setSaturation(value);
                    else if (slider === "blur") setBlurRadius(value);
                    setTimeout(() => {
                        setIsProcessing(false);
                    }, 30);
                },
                []
            );

            // ----- Save slider state to history -----
            const saveSliderState = useCallback(() => {
                applyAndSave();
            }, [applyAndSave]);

            // ----- Keyboard shortcuts -----
            useEffect(() => {
                const handleKeyDown = (e) => {
                    if ((e.ctrlKey || e.metaKey) && e.key === "z") {
                        e.preventDefault();
                        if (e.shiftKey) redo();
                        else undo();
                    }
                    if ((e.ctrlKey || e.metaKey) && e.key === "y") {
                        e.preventDefault();
                        redo();
                    }
                    if ((e.ctrlKey || e.metaKey) && e.key === "s") {
                        e.preventDefault();
                        exportImage();
                    }
                };
                window.addEventListener("keydown", handleKeyDown);
                return () => window.removeEventListener("keydown", handleKeyDown);
            }, [undo, redo, exportImage]);

            // ----- Render -----
            return (
                <div className="min-h-screen flex items-center justify-center bg-gradient-to-br from-orange-400 via-pink-500 to-red-500 p-4">
                    <div className="glass p-6 rounded-3xl shadow-2xl w-full max-w-5xl max-h-[98vh] overflow-y-auto border border-white/20 fade-in">
                        {/* Header */}
                        <div className="flex flex-wrap items-center justify-between gap-3 mb-5">
                            <h1 className="text-3xl font-extrabold bg-gradient-to-r from-orange-500 to-pink-600 bg-clip-text text-transparent">
                                🖼 Photo Editor Pro
                            </h1>
                            <div className="flex flex-wrap gap-2">
                                <button
                                    onClick={triggerUpload}
                                    className="px-4 py-2 bg-blue-500 hover:bg-blue-600 text-white rounded-xl text-sm font-semibold transition shadow-md flex items-center gap-2"
                                >
                                    <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
                                    </svg>
                                    Upload
                                </button>
                                <input
                                    ref={fileInputRef}
                                    type="file"
                                    accept="image/*"
                                    onChange={handleImageUpload}
                                    className="hidden"
                                />
                                <button
                                    onClick={undo}
                                    disabled={historyIndex <= 0 || !imageLoaded}
                                    className="px-3 py-2 bg-gray-200 hover:bg-gray-300 disabled:opacity-40 disabled:cursor-not-allowed rounded-xl text-sm font-semibold transition"
                                    title="Undo (Ctrl+Z)"
                                >
                                    ↩️
                                </button>
                                <button
                                    onClick={redo}
                                    disabled={historyIndex >= history.length - 1 || !imageLoaded}
                                    className="px-3 py-2 bg-gray-200 hover:bg-gray-300 disabled:opacity-40 disabled:cursor-not-allowed rounded-xl text-sm font-semibold transition"
                                    title="Redo (Ctrl+Y)"
                                >
                                    ↪️
                                </button>
                                <button
                                    onClick={resetFilters}
                                    disabled={!imageLoaded}
                                    className="px-3 py-2 bg-red-100 hover:bg-red-200 text-red-700 disabled:opacity-40 disabled:cursor-not-allowed rounded-xl text-sm font-semibold transition"
                                >
                                    🔄 Reset
                                </button>
                            </div>
                        </div>

                        {/* Canvas Area */}
                        <div className="bg-gray-100/80 rounded-2xl p-2 mb-4 flex items-center justify-center border-2 border-dashed border-gray-300 min-h-[300px] relative">
                            {!imageLoaded ? (
                                <div className="text-center py-12 px-4">
                                    <div className="text-6xl mb-4">🖼️</div>
                                    <p className="text-gray-500 text-lg font-medium">
                                        Drop an image here or click Upload
                                    </p>
                                    <p className="text-gray-400 text-sm mt-1">
                                        Supports JPG, PNG, WebP
                                    </p>
                                    <button
                                        onClick={triggerUpload}
                                        className="mt-4 px-6 py-2 bg-blue-500 hover:bg-blue-600 text-white rounded-xl text-sm font-semibold transition"
                                    >
                                        Choose Image
                                    </button>
                                </div>
                            ) : (
                                <canvas
                                    ref={canvasRef}
                                    className="max-w-full max-h-[55vh] object-contain rounded-xl shadow-inner"
                                    style={{ imageRendering: "pixelated" }}
                                />
                            )}
                        </div>

                        {/* Tabs */}
                        {imageLoaded && (
                            <div className="flex flex-wrap gap-2 mb-4 border-b border-gray-200 pb-2">
                                <button
                                    onClick={() => setActiveTab("filters")}
                                    className={`px-4 py-2 rounded-xl text-sm font-semibold transition ${activeTab === "filters" ?
                                        "bg-orange-500 text-white shadow-md" :
                                        "bg-gray-100 hover:bg-gray-200 text-gray-700"
                                    }`}
                                >
                                    🎨 Filters
                                </button>
                                <button
                                    onClick={() => setActiveTab("adjust")}
                                    className={`px-4 py-2 rounded-xl text-sm font-semibold transition ${activeTab === "adjust" ?
                                        "bg-orange-500 text-white shadow-md" :
                                        "bg-gray-100 hover:bg-gray-200 text-gray-700"
                                    }`}
                                >
                                    ⚙️ Adjustments
                                </button>
                                <button
                                    onClick={() => setActiveTab("rotate")}
                                    className={`px-4 py-2 rounded-xl text-sm font-semibold transition ${activeTab === "rotate" ?
                                        "bg-orange-500 text-white shadow-md" :
                                        "bg-gray-100 hover:bg-gray-200 text-gray-700"
                                    }`}
                                >
                                    🔄 Rotate & Flip
                                </button>
                                <div className="flex-1"></div>
                                <div className="flex items-center gap-2">
                                    <select
                                        value={exportFormat}
                                        onChange={(e) => setExportFormat(e.target.value)}
                                        className="px-3 py-2 border border-gray-300 rounded-xl text-sm bg-white"
                                    >
                                        <option value="png">PNG</option>
                                        <option value="jpeg">JPEG</option>
                                    </select>
                                    <button
                                        onClick={exportImage}
                                        disabled={!imageLoaded}
                                        className="px-4 py-2 bg-green-500 hover:bg-green-600 text-white rounded-xl text-sm font-semibold transition shadow-md disabled:opacity-40 disabled:cursor-not-allowed"
                                    >
                                        ⬇️ Export
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* Filter Controls */}
                        {imageLoaded && activeTab === "filters" && (
                            <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-2 mb-4 fade-in">
                                {[
                                    { key: "grayscale", label: "⚫ Grayscale", active: grayscale },
                                    { key: "sepia", label: "🟫 Sepia", active: sepia },
                                    { key: "invert", label: "🔲 Invert", active: invert },
                                    { key: "emboss", label: "🔨 Emboss", active: emboss },
                                    { key: "sharpen", label: "✨ Sharpen", active: sharpen },
                                ].map(({ key, label, active }) => (
                                    <button
                                        key={key}
                                        onClick={() => toggleFilter(key, !active)}
                                        className={`px-3 py-2 rounded-xl text-sm font-medium transition ${active ?
                                            "bg-orange-500 text-white shadow-md" :
                                            "bg-gray-100 hover:bg-gray-200 text-gray-700"
                                        }`}
                                    >
                                        {label}
                                    </button>
                                ))}
                            </div>
                        )}

                        {/* Adjustment Controls */}
                        {imageLoaded && activeTab === "adjust" && (
                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-4 fade-in">
                                {[
                                    { key: "brightness", label: "☀️ Brightness", value: brightness, min: -100, max: 100 },
                                    { key: "contrast", label: "🎭 Contrast", value: contrast, min: -100, max: 100 },
                                    { key: "saturation", label: "🌈 Saturation", value: saturation, min: -100, max: 100 },
                                    { key: "blur", label: "🌫️ Blur", value: blurRadius, min: 0, max: 20 },
                                ].map(({ key, label, value, min, max }) => (
                                    <div key={key} className="flex flex-col gap-1">
                                        <div className="flex justify-between text-sm font-medium text-gray-700">
                                            <span>{label}</span>
                                            <span className="text-gray-500">{value}</span>
                                        </div>
                                        <input
                                            type="range"
                                            min={min}
                                            max={max}
                                            step={1}
                                            value={value}
                                            onChange={(e) => handleSliderChange(key, Number(e.target.value))}
                                            onMouseUp={saveSliderState}
                                            onTouchEnd={saveSliderState}
                                            className="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-orange-500"
                                        />
                                    </div>
                                ))}
                            </div>
                        )}

                        {/* Rotate & Flip Controls */}
                        {imageLoaded && activeTab === "rotate" && (
                            <div className="flex flex-wrap gap-3 mb-4 fade-in">
                                <button
                                    onClick={() => {
                                        setRotation((r) => (r - 90 + 360) % 360);
                                        setTimeout(applyAndSave, 50);
                                    }}
                                    className="px-4 py-2 bg-purple-100 hover:bg-purple-200 text-purple-700 rounded-xl text-sm font-semibold transition"
                                >
                                    ↺ Rotate Left
                                </button>
                                <button
                                    onClick={() => {
                                        setRotation((r) => (r + 90) % 360);
                                        setTimeout(applyAndSave, 50);
                                    }}
                                    className="px-4 py-2 bg-purple-100 hover:bg-purple-200 text-purple-700 rounded-xl text-sm font-semibold transition"
                                >
                                    ↻ Rotate Right
                                </button>
                                <button
                                    onClick={() => {
                                        setFlipH((v) => !v);
                                        setTimeout(applyAndSave, 50);
                                    }}
                                    className={`px-4 py-2 rounded-xl text-sm font-semibold transition ${flipH ?
                                        "bg-orange-500 text-white shadow-md" :
                                        "bg-gray-100 hover:bg-gray-200 text-gray-700"
                                    }`}
                                >
                                    ↔ Flip Horizontal
                                </button>
                                <button
                                    onClick={() => {
                                        setFlipV((v) => !v);
                                        setTimeout(applyAndSave, 50);
                                    }}
                                    className={`px-4 py-2 rounded-xl text-sm font-semibold transition ${flipV ?
                                        "bg-orange-500 text-white shadow-md" :
                                        "bg-gray-100 hover:bg-gray-200 text-gray-700"
                                    }`}
                                >
                                    ↕ Flip Vertical
                                </button>
                                <button
                                    onClick={() => {
                                        setRotation(0);
                                        setFlipH(false);
                                        setFlipV(false);
                                        setTimeout(applyAndSave, 50);
                                    }}
                                    className="px-4 py-2 bg-red-100 hover:bg-red-200 text-red-700 rounded-xl text-sm font-semibold transition"
                                >
                                    Reset Rotation
                                </button>
                            </div>
                        )}

                        {/* Status Bar */}
                        {imageLoaded && (
                            <div className="text-xs text-gray-400 mt-3 flex flex-wrap justify-between border-t border-gray-100 pt-3">
                                <span>
                                    History: {historyIndex + 1} / {history.length} steps
                                    {historyIndex < history.length - 1 && " (modified)"}
                                </span>
                                <span>
                                    {image.width} × {image.height} px
                                    {rotation !== 0 && ` · rotated ${rotation}°`}
                                    {(flipH || flipV) && " · flipped"}
                                </span>
                                <span className="hidden sm:inline">
                                    Shortcuts: Ctrl+Z (Undo) · Ctrl+Y (Redo) · Ctrl+S (Export)
                                </span>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // ----- Render to DOM -----
        const rootElement = document.getElementById("root");
        const root = ReactDOM.createRoot(rootElement);
        root.render( < PhotoEditorPro / > );
    </script>
</body>
</html>
