<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Photo Editor Pro – Clone</title>
    <style>
        /* ── Reset & Base ── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: #0f0f12;
            color: #f5f5f7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 12px;
        }
        .app {
            max-width: 500px;
            width: 100%;
            background: #1c1c1e;
            border-radius: 32px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7);
            overflow: hidden;
            padding: 16px 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        /* ── Header ── */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 4px;
        }
        .header h1 {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header-actions {
            display: flex;
            gap: 12px;
        }
        .header-actions button {
            background: none;
            border: none;
            color: #8e8e93;
            font-size: 20px;
            cursor: pointer;
            transition: 0.2s;
        }
        .header-actions button:hover {
            color: #fff;
        }

        /* ── Canvas Wrapper ── */
        .canvas-wrapper {
            background: #0a0a0c;
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 340px;
            position: relative;
            border: 1px solid #2c2c2e;
        }
        .canvas-wrapper canvas {
            display: block;
            width: 100%;
            height: auto;
            max-height: 460px;
            object-fit: contain;
            background: #0a0a0c;
        }

        /* ── Toolbar Tabs ── */
        .tabs {
            display: flex;
            gap: 4px;
            background: #2a2a2c;
            border-radius: 16px;
            padding: 4px;
            overflow-x: auto;
            flex-shrink: 0;
        }
        .tabs button {
            flex: 1 0 auto;
            padding: 10px 6px;
            background: transparent;
            border: none;
            border-radius: 12px;
            color: #8e8e93;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
        }
        .tabs button.active {
            background: #3a3a3c;
            color: #fff;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
        }
        .tabs button:hover:not(.active) {
            color: #ddd;
        }

        /* ── Tool Panels ── */
        .panel {
            display: none;
            flex-direction: column;
            gap: 14px;
            padding: 8px 4px 4px;
        }
        .panel.active {
            display: flex;
        }

        /* ── Controls ── */
        .control-group {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px 16px;
            background: #252527;
            padding: 12px 14px;
            border-radius: 16px;
        }
        .control-group label {
            font-size: 13px;
            color: #aeaeb2;
            min-width: 70px;
        }
        .control-group input[type="range"] {
            flex: 1;
            min-width: 100px;
            accent-color: #f5576c;
            background: #3a3a3c;
            height: 4px;
            border-radius: 4px;
            -webkit-appearance: none;
            appearance: none;
        }
        .control-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #f5576c;
            cursor: pointer;
            border: 2px solid #1c1c1e;
        }
        .control-group .value {
            font-size: 14px;
            min-width: 32px;
            text-align: right;
            color: #fff;
        }
        .btn-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .btn-row button {
            background: #3a3a3c;
            border: none;
            border-radius: 12px;
            padding: 8px 16px;
            color: #fff;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.15s;
            flex: 1 0 auto;
        }
        .btn-row button:hover {
            background: #4a4a4c;
        }
        .btn-row button.primary {
            background: #f5576c;
            color: #fff;
        }
        .btn-row button.primary:hover {
            background: #e04a5f;
        }

        /* ── Filter grid ── */
        .filter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(64px, 1fr));
            gap: 10px;
        }
        .filter-item {
            background: #252527;
            border-radius: 14px;
            padding: 8px 4px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            border: 2px solid transparent;
        }
        .filter-item.active {
            border-color: #f5576c;
            background: #2f2f31;
        }
        .filter-item:hover {
            background: #333335;
        }
        .filter-item canvas {
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 8px;
            background: #0a0a0c;
            display: block;
        }
        .filter-item span {
            display: block;
            margin-top: 4px;
            font-size: 11px;
            color: #aeaeb2;
        }

        /* ── Upload area ── */
        .upload-area {
            border: 2px dashed #3a3a3c;
            border-radius: 20px;
            padding: 30px 10px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            color: #8e8e93;
        }
        .upload-area:hover {
            border-color: #f5576c;
            background: #1a1a1c;
        }
        .upload-area input {
            display: none;
        }

        /* ── Responsive fine-tune ── */
        @media (max-width: 480px) {
            .app {
                border-radius: 20px;
                padding: 12px;
            }
            .tabs button {
                font-size: 12px;
                padding: 8px 4px;
            }
        }
    </style>
</head>
<body>

<div class="app" id="app">
    <!-- Header -->
    <div class="header">
        <h1>📸 Photo Editor</h1>
        <div class="header-actions">
            <button id="saveBtn" title="Save image">💾</button>
            <button id="resetBtn" title="Reset edits">↺</button>
        </div>
    </div>

    <!-- Canvas -->
    <div class="canvas-wrapper">
        <canvas id="mainCanvas" width="800" height="600"></canvas>
    </div>

    <!-- Tabs -->
    <div class="tabs" id="tabContainer">
        <button class="active" data-tab="filters">Filters</button>
        <button data-tab="adjust">Adjust</button>
        <button data-tab="crop">Crop</button>
        <button data-tab="text">Text</button>
        <button data-tab="draw">Draw</button>
        <button data-tab="collage">Collage</button>
    </div>

    <!-- Panels -->
    <div id="panelContainer">
        <!-- Filters -->
        <div class="panel active" id="panel-filters">
            <div class="filter-grid" id="filterGrid"></div>
        </div>

        <!-- Adjust -->
        <div class="panel" id="panel-adjust">
            <div class="control-group">
                <label>Brightness</label>
                <input type="range" id="brightness" min="-100" max="100" value="0" />
                <span class="value" id="brightnessVal">0</span>
            </div>
            <div class="control-group">
                <label>Contrast</label>
                <input type="range" id="contrast" min="-100" max="100" value="0" />
                <span class="value" id="contrastVal">0</span>
            </div>
            <div class="control-group">
                <label>Saturation</label>
                <input type="range" id="saturation" min="-100" max="100" value="0" />
                <span class="value" id="saturationVal">0</span>
            </div>
            <div class="control-group">
                <label>Blur</label>
                <input type="range" id="blur" min="0" max="20" value="0" step="0.5" />
                <span class="value" id="blurVal">0</span>
            </div>
            <button class="primary" id="applyAdjust" style="padding:12px;border-radius:16px;border:none;font-size:15px;font-weight:600;cursor:pointer;">Apply Adjustments</button>
        </div>

        <!-- Crop -->
        <div class="panel" id="panel-crop">
            <div class="control-group" style="flex-wrap:wrap;">
                <label>Crop X</label>
                <input type="range" id="cropX" min="0" max="100" value="0" />
                <span class="value" id="cropXVal">0</span>
                <label>Crop Y</label>
                <input type="range" id="cropY" min="0" max="100" value="0" />
                <span class="value" id="cropYVal">0</span>
                <label>Width</label>
                <input type="range" id="cropW" min="10" max="100" value="100" />
                <span class="value" id="cropWVal">100</span>
                <label>Height</label>
                <input type="range" id="cropH" min="10" max="100" value="100" />
                <span class="value" id="cropHVal">100</span>
            </div>
            <button class="primary" id="applyCrop" style="padding:12px;border-radius:16px;border:none;font-size:15px;font-weight:600;cursor:pointer;">Apply Crop</button>
        </div>

        <!-- Text -->
        <div class="panel" id="panel-text">
            <div class="control-group" style="flex-wrap:wrap;">
                <input type="text" id="textInput" placeholder="Your text here..." style="flex:1;padding:10px 14px;border-radius:12px;border:1px solid #3a3a3c;background:#1c1c1e;color:#fff;font-size:14px;min-width:140px;" />
            </div>
            <div class="control-group" style="flex-wrap:wrap;">
                <label>Size</label>
                <input type="range" id="textSize" min="12" max="120" value="40" />
                <span class="value" id="textSizeVal">40</span>
                <label>Color</label>
                <input type="color" id="textColor" value="#ffffff" style="width:40px;height:40px;background:none;border:none;cursor:pointer;" />
            </div>
            <button class="primary" id="addTextBtn" style="padding:12px;border-radius:16px;border:none;font-size:15px;font-weight:600;cursor:pointer;">Add Text</button>
        </div>

        <!-- Draw -->
        <div class="panel" id="panel-draw">
            <div class="control-group" style="flex-wrap:wrap;">
                <label>Color</label>
                <input type="color" id="drawColor" value="#f5576c" style="width:40px;height:40px;background:none;border:none;cursor:pointer;" />
                <label>Size</label>
                <input type="range" id="drawSize" min="1" max="30" value="6" />
                <span class="value" id="drawSizeVal">6</span>
            </div>
            <div class="btn-row">
                <button id="drawToggle" class="primary">✏️ Draw</button>
                <button id="clearDraw">🗑️ Clear</button>
            </div>
        </div>

        <!-- Collage -->
        <div class="panel" id="panel-collage">
            <div class="upload-area" id="collageUpload">
                <p>📁 Upload up to 4 images<br/><span style="font-size:12px;color:#6a6a6e;">Click to add photos</span></p>
                <input type="file" id="collageInput" accept="image/*" multiple />
            </div>
            <div class="btn-row">
                <button id="makeCollage" class="primary">🖼️ Create Collage</button>
                <button id="clearCollage">Clear All</button>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px;" id="collagePreview"></div>
        </div>
    </div>
</div>

<script>
    (function() {
        'use strict';

        // ─── DOM refs ──────────────────────────────────────────────
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const tabBtns = document.querySelectorAll('.tabs button');
        const panels = {
            filters: document.getElementById('panel-filters'),
            adjust: document.getElementById('panel-adjust'),
            crop: document.getElementById('panel-crop'),
            text: document.getElementById('panel-text'),
            draw: document.getElementById('panel-draw'),
            collage: document.getElementById('panel-collage')
        };

        // ─── State ──────────────────────────────────────────────────
        let originalImage = null;        // ImageData of the original loaded image (full size)
        let currentImageData = null;     // ImageData currently displayed (after adjustments)
        let imageLoaded = false;
        let editHistory = [];            // simple undo stack (stores ImageData)
        let isDrawing = false;
        let drawMode = false;

        // Filters list
        const filterNames = ['None', 'Grayscale', 'Sepia', 'Invert', 'Brightness+', 'Contrast+', 'Vintage', 'Cool', 'Warm', 'Blur'];
        const filterFunctions = {
            'None': (data) => data,
            'Grayscale': (data) => { for (let i=0; i<data.length; i+=4) { const g=0.299*data[i]+0.587*data[i+1]+0.114*data[i+2]; data[i]=data[i+1]=data[i+2]=g; } return data; },
            'Sepia': (data) => { for (let i=0; i<data.length; i+=4) { let r=data[i], g=data[i+1], b=data[i+2]; data[i]=Math.min(255, r*0.393+g*0.769+b*0.189); data[i+1]=Math.min(255, r*0.349+g*0.686+b*0.168); data[i+2]=Math.min(255, r*0.272+g*0.534+b*0.131); } return data; },
            'Invert': (data) => { for (let i=0; i<data.length; i+=4) { data[i]=255-data[i]; data[i+1]=255-data[i+1]; data[i+2]=255-data[i+2]; } return data; },
            'Brightness+': (data) => { for (let i=0; i<data.length; i+=4) { data[i]=Math.min(255, data[i]+40); data[i+1]=Math.min(255, data[i+1]+40); data[i+2]=Math.min(255, data[i+2]+40); } return data; },
            'Contrast+': (data) => { const factor=1.3; for (let i=0; i<data.length; i+=4) { data[i]=Math.min(255, Math.max(0, ((data[i]/255-0.5)*factor+0.5)*255)); data[i+1]=Math.min(255, Math.max(0, ((data[i+1]/255-0.5)*factor+0.5)*255)); data[i+2]=Math.min(255, Math.max(0, ((data[i+2]/255-0.5)*factor+0.5)*255)); } return data; },
            'Vintage': (data) => { for (let i=0; i<data.length; i+=4) { data[i]=Math.min(255, data[i]*1.1); data[i+1]=Math.min(255, data[i+1]*0.9); data[i+2]=Math.min(255, data[i+2]*0.8); } return data; },
            'Cool': (data) => { for (let i=0; i<data.length; i+=4) { data[i]=Math.min(255, data[i]*0.8); data[i+1]=Math.min(255, data[i+1]*0.9); data[i+2]=Math.min(255, data[i+2]*1.2); } return data; },
            'Warm': (data) => { for (let i=0; i<data.length; i+=4) { data[i]=Math.min(255, data[i]*1.2); data[i+1]=Math.min(255, data[i+1]*1.0); data[i+2]=Math.min(255, data[i+2]*0.8); } return data; },
            'Blur': (data) => { // simple box blur 3x3 – for demonstration; we'll implement a simple blur
                // For performance, we'll use a basic blur kernel (3x3)
                const w = canvas.width, h = canvas.height;
                const src = new Uint8ClampedArray(data);
                const dst = new Uint8ClampedArray(data);
                const size = 3;
                const half = Math.floor(size/2);
                for (let y=0; y<h; y++) {
                    for (let x=0; x<w; x++) {
                        let r=0,g=0,b=0,a=0, count=0;
                        for (let dy=-half; dy<=half; dy++) {
                            for (let dx=-half; dx<=half; dx++) {
                                const nx = Math.min(w-1, Math.max(0, x+dx));
                                const ny = Math.min(h-1, Math.max(0, y+dy));
                                const idx = (ny*w + nx)*4;
                                r += src[idx];
                                g += src[idx+1];
                                b += src[idx+2];
                                a += src[idx+3];
                                count++;
                            }
                        }
                        const idx = (y*w + x)*4;
                        dst[idx] = r/count;
                        dst[idx+1] = g/count;
                        dst[idx+2] = b/count;
                        dst[idx+3] = a/count;
                    }
                }
                for (let i=0; i<data.length; i++) data[i] = dst[i];
                return data;
            }
        };

        // ─── Helpers ──────────────────────────────────────────────
        function loadImageFromFile(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    // Set canvas size to image dimensions
                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);
                    originalImage = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    currentImageData = new Uint8ClampedArray(originalImage.data);
                    imageLoaded = true;
                    editHistory = [];
                    render();
                    populateFilterThumbnails();
                    // reset adjust sliders
                    document.getElementById('brightness').value = 0;
                    document.getElementById('brightnessVal').textContent = '0';
                    document.getElementById('contrast').value = 0;
                    document.getElementById('contrastVal').textContent = '0';
                    document.getElementById('saturation').value = 0;
                    document.getElementById('saturationVal').textContent = '0';
                    document.getElementById('blur').value = 0;
                    document.getElementById('blurVal').textContent = '0';
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function render() {
            if (!imageLoaded) return;
            const imageData = new ImageData(new Uint8ClampedArray(currentImageData), canvas.width, canvas.height);
            ctx.putImageData(imageData, 0, 0);
        }

        function applyFilter(name) {
            if (!imageLoaded) return;
            const data = new Uint8ClampedArray(currentImageData);
            const filtered = filterFunctions[name] ? filterFunctions[name](data) : data;
            currentImageData = new Uint8ClampedArray(filtered);
            render();
        }

        // ─── Filter thumbnails ────────────────────────────────────
        function populateFilterThumbnails() {
            const grid = document.getElementById('filterGrid');
            grid.innerHTML = '';
            if (!imageLoaded) {
                grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:#8e8e93;padding:20px;">Upload an image first</div>';
                return;
            }
            // Use a small canvas for thumbnails
            const thumbSize = 80;
            filterNames.forEach(name => {
                const div = document.createElement('div');
                div.className = 'filter-item';
                const thumbCanvas = document.createElement('canvas');
                thumbCanvas.width = thumbSize;
                thumbCanvas.height = thumbSize;
                const tCtx = thumbCanvas.getContext('2d');
                // Draw scaled down original
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = canvas.width;
                tempCanvas.height = canvas.height;
                const tCtx2 = tempCanvas.getContext('2d');
                tCtx2.putImageData(new ImageData(new Uint8ClampedArray(originalImage.data), canvas.width, canvas.height), 0, 0);
                // Apply filter if not None
                if (name !== 'None') {
                    const imgData = tCtx2.getImageData(0,0,tempCanvas.width,tempCanvas.height);
                    const filtered = filterFunctions[name] ? filterFunctions[name](new Uint8ClampedArray(imgData.data)) : imgData.data;
                    tCtx2.putImageData(new ImageData(new Uint8ClampedArray(filtered), tempCanvas.width, tempCanvas.height), 0, 0);
                }
                tCtx.drawImage(tempCanvas, 0, 0, thumbSize, thumbSize);
                div.appendChild(thumbCanvas);
                const span = document.createElement('span');
                span.textContent = name;
                div.appendChild(span);
                div.addEventListener('click', () => {
                    document.querySelectorAll('.filter-item').forEach(el => el.classList.remove('active'));
                    div.classList.add('active');
                    applyFilter(name);
                });
                grid.appendChild(div);
            });
        }

        // ─── Adjustments ──────────────────────────────────────────
        function applyAdjustments(brightness, contrast, saturation, blur) {
            if (!imageLoaded) return;
            let data = new Uint8ClampedArray(originalImage.data);
            // brightness
            if (brightness !== 0) {
                const b = brightness * 2.55;
                for (let i=0; i<data.length; i+=4) {
                    data[i] = Math.min(255, Math.max(0, data[i] + b));
                    data[i+1] = Math.min(255, Math.max(0, data[i+1] + b));
                    data[i+2] = Math.min(255, Math.max(0, data[i+2] + b));
                }
            }
            // contrast
            if (contrast !== 0) {
                const factor = 1 + contrast/100;
                for (let i=0; i<data.length; i+=4) {
                    data[i] = Math.min(255, Math.max(0, ((data[i]/255 - 0.5) * factor + 0.5) * 255));
                    data[i+1] = Math.min(255, Math.max(0, ((data[i+1]/255 - 0.5) * factor + 0.5) * 255));
                    data[i+2] = Math.min(255, Math.max(0, ((data[i+2]/255 - 0.5) * factor + 0.5) * 255));
                }
            }
            // saturation
            if (saturation !== 0) {
                const sat = 1 + saturation/100;
                for (let i=0; i<data.length; i+=4) {
                    const gray = 0.299*data[i] + 0.587*data[i+1] + 0.114*data[i+2];
                    data[i] = Math.min(255, Math.max(0, gray + sat*(data[i]-gray)));
                    data[i+1] = Math.min(255, Math.max(0, gray + sat*(data[i+1]-gray)));
                    data[i+2] = Math.min(255, Math.max(0, gray + sat*(data[i+2]-gray)));
                }
            }
            // blur
            if (blur > 0) {
                // simple box blur (3x3)
                const w = canvas.width, h = canvas.height;
                const src = new Uint8ClampedArray(data);
                const dst = new Uint8ClampedArray(data);
                const size = 3;
                const half = Math.floor(size/2);
                for (let y=0; y<h; y++) {
                    for (let x=0; x<w; x++) {
                        let r=0,g=0,b=0,a=0, count=0;
                        for (let dy=-half; dy<=half; dy++) {
                            for (let dx=-half; dx<=half; dx++) {
                                const nx = Math.min(w-1, Math.max(0, x+dx));
                                const ny = Math.min(h-1, Math.max(0, y+dy));
                                const idx = (ny*w + nx)*4;
                                r += src[idx];
                                g += src[idx+1];
                                b += src[idx+2];
                                a += src[idx+3];
                                count++;
                            }
                        }
                        const idx = (y*w + x)*4;
                        dst[idx] = r/count;
                        dst[idx+1] = g/count;
                        dst[idx+2] = b/count;
                        dst[idx+3] = a/count;
                    }
                }
                data = dst;
            }
            currentImageData = data;
            render();
        }

        // ─── Crop ──────────────────────────────────────────────────
        function applyCrop(x, y, w, h) {
            if (!imageLoaded) return;
            const srcW = canvas.width, srcH = canvas.height;
            const cropX = Math.round(x * srcW / 100);
            const cropY = Math.round(y * srcH / 100);
            const cropW = Math.round(w * srcW / 100);
            const cropH = Math.round(h * srcH / 100);
            if (cropW < 1 || cropH < 1) return;
            const imageData = new ImageData(new Uint8ClampedArray(currentImageData), srcW, srcH);
            const cropped = ctx.getImageData(cropX, cropY, cropW, cropH);
            canvas.width = cropW;
            canvas.height = cropH;
            ctx.putImageData(cropped, 0, 0);
            // Update original and current
            originalImage = ctx.getImageData(0, 0, cropW, cropH);
            currentImageData = new Uint8ClampedArray(originalImage.data);
            render();
            populateFilterThumbnails();
        }

        // ─── Text overlay ──────────────────────────────────────────
        function addText(text, size, color) {
            if (!imageLoaded || !text) return;
            ctx.font = `bold ${size}px 'Segoe UI', system-ui, sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = color;
            const x = canvas.width/2;
            const y = canvas.height/2;
            ctx.fillText(text, x, y);
            // update currentImageData
            currentImageData = new Uint8ClampedArray(ctx.getImageData(0,0,canvas.width,canvas.height).data);
            render();
        }

        // ─── Drawing ──────────────────────────────────────────────
        function initDraw() {
            let drawing = false;
            let lastX = 0, lastY = 0;
            const colorInput = document.getElementById('drawColor');
            const sizeInput = document.getElementById('drawSize');

            function startDraw(e) {
                if (!drawMode || !imageLoaded) return;
                e.preventDefault();
                drawing = true;
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                const mouseX = (e.clientX - rect.left) * scaleX;
                const mouseY = (e.clientY - rect.top) * scaleY;
                lastX = mouseX;
                lastY = mouseY;
                // draw a dot
                ctx.beginPath();
                ctx.arc(lastX, lastY, parseInt(sizeInput.value)/2, 0, Math.PI*2);
                ctx.fillStyle = colorInput.value;
                ctx.fill();
                currentImageData = new Uint8ClampedArray(ctx.getImageData(0,0,canvas.width,canvas.height).data);
                render();
            }

            function drawMove(e) {
                if (!drawing || !drawMode || !imageLoaded) return;
                e.preventDefault();
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                const mouseX = (e.clientX - rect.left) * scaleX;
                const mouseY = (e.clientY - rect.top) * scaleY;
                ctx.beginPath();
                ctx.moveTo(lastX, lastY);
                ctx.lineTo(mouseX, mouseY);
                ctx.strokeStyle = colorInput.value;
                ctx.lineWidth = parseInt(sizeInput.value);
                ctx.lineCap = 'round';
                ctx.stroke();
                lastX = mouseX;
                lastY = mouseY;
                currentImageData = new Uint8ClampedArray(ctx.getImageData(0,0,canvas.width,canvas.height).data);
                render();
            }

            function endDraw(e) {
                if (drawing) {
                    drawing = false;
                    currentImageData = new Uint8ClampedArray(ctx.getImageData(0,0,canvas.width,canvas.height).data);
                    render();
                }
            }

            canvas.addEventListener('mousedown', startDraw);
            canvas.addEventListener('mousemove', drawMove);
            canvas.addEventListener('mouseup', endDraw);
            canvas.addEventListener('mouseleave', endDraw);

            // Touch support
            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const touch = e.touches[0];
                const mouseEvent = new MouseEvent('mousedown', {
                    clientX: touch.clientX,
                    clientY: touch.clientY
                });
                canvas.dispatchEvent(mouseEvent);
            }, {passive: false});
            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                const touch = e.touches[0];
                const mouseEvent = new MouseEvent('mousemove', {
                    clientX: touch.clientX,
                    clientY: touch.clientY
                });
                canvas.dispatchEvent(mouseEvent);
            }, {passive: false});
            canvas.addEventListener('touchend', (e) => {
                e.preventDefault();
                canvas.dispatchEvent(new MouseEvent('mouseup'));
            }, {passive: false});
        }

        // ─── Collage ──────────────────────────────────────────────
        let collageImages = [];

        function renderCollagePreviews() {
            const container = document.getElementById('collagePreview');
            container.innerHTML = '';
            collageImages.forEach((img, idx) => {
                const div = document.createElement('div');
                div.style.position = 'relative';
                const thumb = document.createElement('img');
                thumb.src = img.src;
                thumb.style.width = '100%';
                thumb.style.aspectRatio = '1/1';
                thumb.style.objectFit = 'cover';
                thumb.style.borderRadius = '8px';
                div.appendChild(thumb);
                const removeBtn = document.createElement('button');
                removeBtn.textContent = '✕';
                removeBtn.style.position = 'absolute';
                removeBtn.style.top = '2px';
                removeBtn.style.right = '2px';
                removeBtn.style.background = '#f5576c';
                removeBtn.style.border = 'none';
                removeBtn.style.borderRadius = '50%';
                removeBtn.style.width = '20px';
                removeBtn.style.height = '20px';
                removeBtn.style.color = '#fff';
                removeBtn.style.fontSize = '12px';
                removeBtn.style.cursor = 'pointer';
                removeBtn.addEventListener('click', () => {
                    collageImages.splice(idx, 1);
                    renderCollagePreviews();
                });
                div.appendChild(removeBtn);
                container.appendChild(div);
            });
        }

        function createCollage() {
            if (collageImages.length < 2) {
                alert('Please upload at least 2 images.');
                return;
            }
            const cols = Math.min(collageImages.length, 4);
            const rows = Math.ceil(collageImages.length / cols);
            const cellSize = 300;
            const collageW = cols * cellSize;
            const collageH = rows * cellSize;
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = collageW;
            tempCanvas.height = collageH;
            const tCtx = tempCanvas.getContext('2d');
            let loaded = 0;
            collageImages.forEach((imgObj, idx) => {
                const img = new Image();
                img.onload = () => {
                    const x = (idx % cols) * cellSize;
                    const y = Math.floor(idx / cols) * cellSize;
                    // cover fit
                    const aspect = img.width / img.height;
                    let drawW = cellSize, drawH = cellSize;
                    if (aspect > 1) {
                        drawH = cellSize / aspect;
                    } else {
                        drawW = cellSize * aspect;
                    }
                    const offX = (cellSize - drawW)/2;
                    const offY = (cellSize - drawH)/2;
                    tCtx.drawImage(img, x+offX, y+offY, drawW, drawH);
                    loaded++;
                    if (loaded === collageImages.length) {
                        // set main canvas to collage
                        canvas.width = collageW;
                        canvas.height = collageH;
                        ctx.drawImage(tempCanvas, 0, 0);
                        originalImage = ctx.getImageData(0, 0, canvas.width, canvas.height);
                        currentImageData = new Uint8ClampedArray(originalImage.data);
                        imageLoaded = true;
                        render();
                        populateFilterThumbnails();
                    }
                };
                img.src = imgObj.src;
            });
        }

        // ─── Tab switching ────────────────────────────────────────
        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                tabBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const tab = btn.dataset.tab;
                Object.keys(panels).forEach(key => {
                    panels[key].classList.toggle('active', key === tab);
                });
                // If draw tab, enable draw mode; else disable
                if (tab === 'draw') {
                    drawMode = true;
                    document.getElementById('drawToggle').textContent = '✏️ Drawing (ON)';
                } else {
                    drawMode = false;
                    document.getElementById('drawToggle').textContent = '✏️ Draw';
                }
            });
        });

        // ─── Event bindings ──────────────────────────────────────

        // Upload via file input (hidden)
        const uploadInput = document.createElement('input');
        uploadInput.type = 'file';
        uploadInput.accept = 'image/*';
        uploadInput.style.display = 'none';
        document.body.appendChild(uploadInput);
        uploadInput.addEventListener('change', (e) => {
            if (e.target.files.length) {
                loadImageFromFile(e.target.files[0]);
            }
            uploadInput.value = '';
        });

        // Click on canvas wrapper to upload
        document.querySelector('.canvas-wrapper').addEventListener('click', () => {
            if (!imageLoaded) uploadInput.click();
        });

        // Upload area inside collage
        document.getElementById('collageUpload').addEventListener('click', () => {
            document.getElementById('collageInput').click();
        });
        document.getElementById('collageInput').addEventListener('change', (e) => {
            const files = e.target.files;
            if (files.length) {
                for (let file of files) {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        collageImages.push({ src: ev.target.result });
                        renderCollagePreviews();
                    };
                    reader.readAsDataURL(file);
                }
            }
            e.target.value = '';
        });

        // Filter grid population on load (empty)
        populateFilterThumbnails();

        // Adjust sliders real-time display
        ['brightness','contrast','saturation','blur'].forEach(id => {
            const input = document.getElementById(id);
            const val = document.getElementById(id+'Val');
            input.addEventListener('input', () => {
                val.textContent = input.value;
            });
        });

        // Apply adjust
        document.getElementById('applyAdjust').addEventListener('click', () => {
            const b = parseInt(document.getElementById('brightness').value);
            const c = parseInt(document.getElementById('contrast').value);
            const s = parseInt(document.getElementById('saturation').value);
            const bl = parseFloat(document.getElementById('blur').value);
            applyAdjustments(b, c, s, bl);
        });

        // Crop sliders
        ['cropX','cropY','cropW','cropH'].forEach(id => {
            const input = document.getElementById(id);
            const val = document.getElementById(id+'Val');
            input.addEventListener('input', () => {
                val.textContent = input.value;
            });
        });
        document.getElementById('applyCrop').addEventListener('click', () => {
            const x = parseInt(document.getElementById('cropX').value);
            const y = parseInt(document.getElementById('cropY').value);
            const w = parseInt(document.getElementById('cropW').value);
            const h = parseInt(document.getElementById('cropH').value);
            applyCrop(x, y, w, h);
        });

        // Text
        document.getElementById('addTextBtn').addEventListener('click', () => {
            const text = document.getElementById('textInput').value;
            const size = parseInt(document.getElementById('textSize').value);
            const color = document.getElementById('textColor').value;
            if (text) addText(text, size, color);
        });
        document.getElementById('textSize').addEventListener('input', () => {
            document.getElementById('textSizeVal').textContent = document.getElementById('textSize').value;
        });

        // Draw
        document.getElementById('drawToggle').addEventListener('click', function() {
            drawMode = !drawMode;
            this.textContent = drawMode ? '✏️ Drawing (ON)' : '✏️ Draw';
        });
        document.getElementById('drawSize').addEventListener('input', () => {
            document.getElementById('drawSizeVal').textContent = document.getElementById('drawSize').value;
        });
        document.getElementById('clearDraw').addEventListener('click', () => {
            if (imageLoaded) {
                ctx.putImageData(new ImageData(new Uint8ClampedArray(originalImage.data), canvas.width, canvas.height), 0, 0);
                currentImageData = new Uint8ClampedArray(originalImage.data);
                render();
            }
        });
        initDraw();

        // Collage
        document.getElementById('makeCollage').addEventListener('click', createCollage);
        document.getElementById('clearCollage').addEventListener('click', () => {
            collageImages = [];
            renderCollagePreviews();
        });

        // Save
        document.getElementById('saveBtn').addEventListener('click', () => {
            if (!imageLoaded) return;
            const link = document.createElement('a');
            link.download = 'edited_photo.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        });

        // Reset
        document.getElementById('resetBtn').addEventListener('click', () => {
            if (!imageLoaded) return;
            ctx.putImageData(new ImageData(new Uint8ClampedArray(originalImage.data), canvas.width, canvas.height), 0, 0);
            currentImageData = new Uint8ClampedArray(originalImage.data);
            render();
            populateFilterThumbnails();
            document.querySelectorAll('.filter-item').forEach(el => el.classList.remove('active'));
        });

        // ─── Init ──────────────────────────────────────────────────
        // Set default canvas background
        ctx.fillStyle = '#0a0a0c';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        // Preload with a demo message
        ctx.fillStyle = '#3a3a3c';
        ctx.font = '18px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('Click here to upload an image', canvas.width/2, canvas.height/2);

        console.log('Photo Editor Pro Clone ready!');
    })();
</script>
</body>
</html>
