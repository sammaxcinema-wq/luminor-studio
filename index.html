<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Luminor Studio Pro — Professional Photo Editor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --brand-primary: #2F66F6;
      --brand-primary-glow: rgba(47, 102, 246, 0.15);
      --bg-surface: rgba(10, 11, 14, 0.65);
      --border-subtle: rgba(255, 255, 255, 0.04);
      --border-elevated: rgba(255, 255, 255, 0.08);
    }
    
    * { 
      touch-action: pan-y pinch-zoom; 
      -webkit-tap-highlight-color: transparent;
      box-sizing: border-box;
    }
    
    body { 
      font-family: 'Inter', system-ui, sans-serif;
      background-color: #040507;
      overflow: hidden;
      letter-spacing: -0.01em;
      margin: 0;
      padding: 0;
    }

    ::-webkit-scrollbar { width: 3px; height: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 99px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--brand-primary); }

    .glass-panel { 
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    .glass-input { 
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border-subtle);
      border-radius: 10px;
      transition: all 0.2s cubic-bezier(0.2, 0.8, 0.2, 1);
      color: white;
    }
    
    .glass-input:hover {
      background: rgba(255, 255, 255, 0.04);
      border-color: rgba(255, 255, 255, 0.12);
    }
    
    .glass-input:focus {
      border-color: var(--brand-primary);
      background: rgba(47, 102, 246, 0.03);
      box-shadow: 0 0 0 3px var(--brand-primary-glow);
      outline: none;
    }

    .btn-action {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s cubic-bezier(0.25, 1, 0.5, 1);
      transform: translateZ(0);
      will-change: transform, opacity;
    }

    .btn-action:active {
      transform: scale(0.97) translateY(0.5px);
    }

    @keyframes fadeIn { 
      from { opacity: 0; transform: translateY(6px); } 
      to { opacity: 1; transform: translateY(0); } 
    }

    .animate-fadeIn { 
      animation: fadeIn 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .animate-spin {
      animation: spin 1s linear infinite;
    }
  </style>
</head>
<body class="bg-black text-white antialiased overflow-hidden select-none">

<div id="root"></div>

<script type="text/babel">
  const { useState, useEffect, useRef, useCallback, useMemo } = React;

  // ========== VALIDATION ==========
  const validateEmail = (email) => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
  const validatePassword = (password) => password && password.length >= 6;

  // ========== IMAGE PROCESSING ==========
  function catmullRom(p0, p1, p2, p3, t) {
    const t2 = t * t, t3 = t2 * t;
    return 0.5 * (
      2 * p1 +
      (-p0 + p2) * t +
      (2 * p0 - 5 * p1 + 4 * p2 - p3) * t2 +
      (-p0 + 3 * p1 - 3 * p2 + p3) * t3
    );
  }

  function interpolateCurve(points, numPoints = 256) {
    if (points.length < 2) return new Uint8ClampedArray(numPoints).fill(0);
    
    const sorted = [...points].sort((a, b) => a.x - b.x);
    let extended = [...sorted];
    if (extended[0].x > 0) extended.unshift({ x: 0, y: extended[0].y });
    if (extended[extended.length - 1].x < 1) extended.push({ x: 1, y: extended[extended.length - 1].y });
    
    const result = new Uint8ClampedArray(numPoints);
    for (let i = 0; i < numPoints; i++) {
      const x = i / (numPoints - 1);
      let idx = 0;
      while (idx < extended.length - 2 && extended[idx + 1].x < x) idx++;
      
      const p0 = extended[Math.max(0, idx - 1)];
      const p1 = extended[idx];
      const p2 = extended[idx + 1];
      const p3 = extended[Math.min(extended.length - 1, idx + 2)];
      
      const t = (x - p1.x) / (p2.x - p1.x);
      const value = catmullRom(p0.y, p1.y, p2.y, p3.y, t);
      result[i] = Math.min(255, Math.max(0, Math.floor(value * 255)));
    }
    return result;
  }

  function processImage(srcData, dstData, adjustments) {
    const { exposure, contrast, saturation, highlights, shadows, warmth, tint, vibrancy } = adjustments;
    
    const expFactor = Math.pow(2, exposure);
    const cont = contrast + 1;
    const hl = highlights * 0.5;
    const sh = shadows * 0.5;

    for (let i = 0; i < srcData.length; i += 4) {
      let r = srcData[i] / 255;
      let g = srcData[i + 1] / 255;
      let b = srcData[i + 2] / 255;
      const a = srcData[i + 3] / 255;

      // Exposure & contrast
      r *= expFactor;
      g *= expFactor;
      b *= expFactor;

      r = ((r - 0.5) * cont) + 0.5;
      g = ((g - 0.5) * cont) + 0.5;
      b = ((b - 0.5) * cont) + 0.5;

      // Highlights & shadows
      r = Math.pow(Math.max(0, r), 1 + hl) * (1 - sh) + sh;
      g = Math.pow(Math.max(0, g), 1 + hl) * (1 - sh) + sh;
      b = Math.pow(Math.max(0, b), 1 + hl) * (1 - sh) + sh;

      // Warmth (shift RGB)
      r += warmth * 0.05;
      b -= warmth * 0.05;

      // Tint (shift G)
      g += tint * 0.05;

      // Saturation
      const gray = 0.299 * r + 0.587 * g + 0.114 * b;
      r = gray + (r - gray) * (1 + saturation);
      g = gray + (g - gray) * (1 + saturation);
      b = gray + (b - gray) * (1 + saturation);

      // Vibrancy (boost saturation for less saturated colors)
      const maxC = Math.max(r, g, b);
      const minC = Math.min(r, g, b);
      const chroma = maxC - minC;
      if (chroma > 0) {
        const boost = vibrancy * (1 - chroma);
        r += (r - gray) * boost * 0.5;
        g += (g - gray) * boost * 0.5;
        b += (b - gray) * boost * 0.5;
      }

      // Clamp
      dstData[i] = Math.min(255, Math.max(0, Math.round(r * 255)));
      dstData[i + 1] = Math.min(255, Math.max(0, Math.round(g * 255)));
      dstData[i + 2] = Math.min(255, Math.max(0, Math.round(b * 255)));
      dstData[i + 3] = srcData[i + 3];
    }
  }

  // ========== FILTER PRESETS ==========
  const FILTERS = {
    'None': { exposure: 0, contrast: 0, saturation: 0, highlights: 0, shadows: 0, warmth: 0, tint: 0, vibrancy: 0 },
    'Warm': { exposure: 0.2, contrast: 0.1, saturation: 0.15, highlights: -0.1, shadows: 0.1, warmth: 0.4, tint: -0.1, vibrancy: 0 },
    'Cool': { exposure: 0.1, contrast: 0.15, saturation: 0.1, highlights: 0, shadows: -0.1, warmth: -0.5, tint: 0.2, vibrancy: 0 },
    'Vintage': { exposure: -0.15, contrast: 0.2, saturation: -0.2, highlights: 0.15, shadows: 0.3, warmth: 0.3, tint: 0.1, vibrancy: -0.1 },
    'B&W': { exposure: 0, contrast: 0.3, saturation: -1, highlights: 0.1, shadows: 0.1, warmth: 0, tint: 0, vibrancy: 0 },
    'Vivid': { exposure: 0.1, contrast: 0.25, saturation: 0.4, highlights: -0.2, shadows: 0.15, warmth: 0.1, tint: 0.1, vibrancy: 0.3 },
    'Fade': { exposure: 0.3, contrast: -0.15, saturation: -0.3, highlights: -0.2, shadows: 0.2, warmth: 0.15, tint: 0, vibrancy: -0.2 },
    'Deep': { exposure: -0.2, contrast: 0.4, saturation: 0.2, highlights: 0.1, shadows: -0.3, warmth: 0.2, tint: 0, vibrancy: 0.2 }
  };

  // ========== AUTH COMPONENT ==========
  const AuthGuard = ({ onAuthSuccess }) => {
    const [email, setEmail] = useState('');
    const [password, setPassword] = useState('');
    const [error, setError] = useState('');
    const [loading, setLoading] = useState(false);

    const handleSubmit = (e) => {
      e.preventDefault();
      if (!email || !validateEmail(email)) {
        setError('Please enter a valid email address');
        return;
      }
      if (!password || !validatePassword(password)) {
        setError('Password must be at least 6 characters');
        return;
      }
      
      setError('');
      setLoading(true);
      setTimeout(() => {
        setLoading(false);
        onAuthSuccess({ email, token: 'lum_' + Date.now() });
      }, 800);
    };

    return (
      <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-[#040507]">
        <div className="absolute top-1/4 left-1/4 w-96 h-96 bg-blue-500/10 rounded-full blur-[120px] pointer-events-none" />
        <div className="absolute bottom-1/4 right-1/4 w-96 h-96 bg-purple-500/10 rounded-full blur-[120px] pointer-events-none" />
        
        <div className="glass-panel w-full max-w-md rounded-2xl p-6 md:p-8 relative z-10 animate-fadeIn">
          <div className="flex flex-col items-center mb-8">
            <div className="w-12 h-12 bg-blue-600 rounded-xl flex items-center justify-center shadow-[0_0_20px_rgba(47,102,246,0.4)] mb-3">
              <span className="font-bold text-xl">✓</span>
            </div>
            <h1 className="text-2xl font-bold tracking-tight">Luminor Studio</h1>
            <p className="text-xs text-gray-400 mt-2">Professional Photo Editor</p>
          </div>

          {error && <div className="mb-4 p-3 bg-red-500/10 border border-red-500/20 rounded-lg text-xs text-red-400 animate-fadeIn">{error}</div>}

          <form onSubmit={handleSubmit} className="space-y-4">
            <div>
              <label className="text-xs font-semibold text-gray-400 mb-2 block">Email</label>
              <input 
                type="email"
                value={email}
                onChange={(e) => setEmail(e.target.value.trim())}
                disabled={loading}
                className="glass-input w-full px-4 py-3 text-sm"
                placeholder="your@email.com"
                autoComplete="email"
              />
            </div>
            <div>
              <label className="text-xs font-semibold text-gray-400 mb-2 block">Password</label>
              <input
                type="password"
                value={password}
                onChange={(e) => setPassword(e.target.value)}
                disabled={loading}
                className="glass-input w-full px-4 py-3 text-sm"
                placeholder="••••••••"
                autoComplete="current-password"
              />
            </div>
            <button
              type="submit"
              disabled={loading}
              className="btn-action w-full bg-blue-600 hover:bg-blue-700 disabled:opacity-50 text-white font-semibold py-3 rounded-lg transition shadow-[0_12px_32px_rgba(47,102,246,0.25)]"
            >
              {loading ? (
                <><div className="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin mr-2" /><span>Signing in...</span></>
              ) : (
                'Sign In'
              )}
            </button>
          </form>

          <p className="text-[10px] text-gray-500 mt-6 text-center">Demo: any email + 6+ char password</p>
        </div>
      </div>
    );
  };

  // ========== SLIDER COMPONENT ==========
  const Slider = ({ label, value, min, max, step, onChange, onCommit, unit = '' }) => {
    const id = React.useId();
    return (
      <div className="mb-4">
        <div className="flex justify-between text-xs text-gray-400 mb-2">
          <label htmlFor={id} className="font-medium">{label}</label>
          <span className="font-mono text-white/80">{value.toFixed(2)}{unit}</span>
        </div>
        <input
          id={id}
          type="range"
          min={min}
          max={max}
          step={step}
          value={value}
          onChange={(e) => onChange(parseFloat(e.target.value))}
          onMouseUp={onCommit}
          onTouchEnd={onCommit}
          className="w-full h-1 bg-white/10 rounded-full appearance-none cursor-pointer accent-blue-600"
        />
      </div>
    );
  };

  // ========== MAIN EDITOR ==========
  const PhotoEditor = ({ user, onLogout }) => {
    const [image, setImage] = useState(null);
    const [adjustments, setAdjustments] = useState({
      exposure: 0, contrast: 0, saturation: 0, highlights: 0, shadows: 0,
      warmth: 0, tint: 0, vibrancy: 0
    });
    const [history, setHistory] = useState([adjustments]);
    const [historyIdx, setHistoryIdx] = useState(0);
    const [splitPos, setSplitPos] = useState(0.5);
    const [selectedFilter, setSelectedFilter] = useState('None');
    const [mobileTab, setMobileTab] = useState('adjust');
    const [showMobilePanel, setShowMobilePanel] = useState(false);

    const canvasRef = useRef(null);
    const originalRef = useRef(null);
    const processedRef = useRef(null);

    // Generate test image
    useEffect(() => {
      const canvas = document.createElement('canvas');
      canvas.width = 1000;
      canvas.height = 667;
      const ctx = canvas.getContext('2d');

      // Base gradient
      const grad = ctx.createLinearGradient(0, 0, 1000, 667);
      grad.addColorStop(0, '#1a472a');
      grad.addColorStop(0.5, '#2d5a4a');
      grad.addColorStop(1, '#1f3d3a');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, 1000, 667);

      // Light overlay
      const light = ctx.createRadialGradient(700, 0, 0, 700, 0, 1000);
      light.addColorStop(0, 'rgba(255,200,100,0.2)');
      light.addColorStop(1, 'rgba(255,200,100,0)');
      ctx.fillStyle = light;
      ctx.fillRect(0, 0, 1000, 667);

      // Shapes
      ctx.fillStyle = 'rgba(100, 200, 255, 0.1)';
      ctx.beginPath();
      ctx.ellipse(300, 267, 350, 250, -0.3, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = 'rgba(200, 100, 255, 0.08)';
      ctx.beginPath();
      ctx.ellipse(750, 400, 300, 300, 0.4, 0, Math.PI * 2);
      ctx.fill();

      // Accent lines
      ctx.strokeStyle = 'rgba(100, 220, 255, 0.3)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(200, 200, 80, 0, Math.PI * 2);
      ctx.stroke();

      ctx.strokeStyle = 'rgba(255, 150, 100, 0.25)';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(500, 0);
      ctx.lineTo(500, 667);
      ctx.stroke();

      const imgData = ctx.getImageData(0, 0, 1000, 667);
      setImage(imgData);
      originalRef.current = imgData;
      processedRef.current = new ImageData(
        new Uint8ClampedArray(imgData.data.length),
        imgData.width,
        imgData.height
      );
    }, []);

    // Draw split view
    useEffect(() => {
      if (!image || !canvasRef.current) return;

      const canvas = canvasRef.current;
      const ctx = canvas.getContext('2d');
      if (!ctx) return;

      canvas.width = image.width;
      canvas.height = image.height;

      try {
        processImage(originalRef.current.data, processedRef.current.data, adjustments);

        const splitX = image.width * splitPos;
        
        const origCanvas = document.createElement('canvas');
        origCanvas.width = image.width;
        origCanvas.height = image.height;
        origCanvas.getContext('2d').putImageData(originalRef.current, 0, 0);

        const procCanvas = document.createElement('canvas');
        procCanvas.width = image.width;
        procCanvas.height = image.height;
        procCanvas.getContext('2d').putImageData(processedRef.current, 0, 0);

        ctx.drawImage(origCanvas, 0, 0, splitX, image.height, 0, 0, splitX, image.height);
        ctx.drawImage(procCanvas, splitX, 0, image.width - splitX, image.height, splitX, 0, image.width - splitX, image.height);

        // Divider
        ctx.strokeStyle = '#2F66F6';
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(splitX, 0);
        ctx.lineTo(splitX, image.height);
        ctx.stroke();
      } catch (e) {
        console.error('Draw error:', e);
      }
    }, [image, adjustments, splitPos]);

    const updateAdjustment = (key, value) => {
      setAdjustments(prev => ({ ...prev, [key]: value }));
    };

    const commitHistory = () => {
      const newHistory = history.slice(0, historyIdx + 1);
      newHistory.push({ ...adjustments });
      setHistory(newHistory);
      setHistoryIdx(newHistory.length - 1);
    };

    const applyFilter = (filterName) => {
      setSelectedFilter(filterName);
      setAdjustments(FILTERS[filterName]);
      commitHistory();
    };

    const undo = () => {
      if (historyIdx > 0) {
        setHistoryIdx(historyIdx - 1);
        setAdjustments(history[historyIdx - 1]);
      }
    };

    const redo = () => {
      if (historyIdx < history.length - 1) {
        setHistoryIdx(historyIdx + 1);
        setAdjustments(history[historyIdx + 1]);
      }
    };

    const reset = () => {
      setAdjustments({ exposure: 0, contrast: 0, saturation: 0, highlights: 0, shadows: 0, warmth: 0, tint: 0, vibrancy: 0 });
      setSelectedFilter('None');
      setHistoryIdx(0);
      setHistory([{ exposure: 0, contrast: 0, saturation: 0, highlights: 0, shadows: 0, warmth: 0, tint: 0, vibrancy: 0 }]);
    };

    // Keyboard shortcuts
    useEffect(() => {
      const handler = (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
          e.preventDefault();
          undo();
        } else if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || (e.key === 'z' && e.shiftKey))) {
          e.preventDefault();
          redo();
        }
      };
      window.addEventListener('keydown', handler);
      return () => window.removeEventListener('keydown', handler);
    }, [historyIdx, history]);

    const handleDrag = (e) => {
      if (!canvasRef.current) return;
      const rect = canvasRef.current.getBoundingClientRect();
      const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
      setSplitPos(Math.max(0, Math.min(1, x / rect.width)));
    };

    return (
      <div className="flex flex-col h-screen w-full bg-[#040507]">
        {/* Header */}
        <header className="h-14 shrink-0 glass-panel border-b border-white/5 flex items-center justify-between px-4 z-30">
          <div className="flex items-center gap-2">
            <div className="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center font-bold text-sm">✓</div>
            <span className="font-bold text-sm hidden sm:inline">Luminor</span>
          </div>
          <div className="flex items-center gap-3">
            <div className="flex gap-1 bg-white/5 p-1 rounded-lg border border-white/10">
              <button onClick={undo} disabled={historyIdx === 0} className="btn-action px-2 py-1 text-xs hover:text-white disabled:opacity-30 text-gray-400">↩</button>
              <button onClick={redo} disabled={historyIdx === history.length - 1} className="btn-action px-2 py-1 text-xs hover:text-white disabled:opacity-30 text-gray-400">↪</button>
            </div>
            <button onClick={reset} className="btn-action px-3 py-1.5 text-xs bg-white/5 hover:bg-white/10 rounded-lg border border-white/10 text-gray-400 hover:text-white transition">Reset</button>
            <button onClick={onLogout} className="btn-action px-3 py-1.5 text-xs bg-red-500/10 hover:bg-red-500/20 rounded-lg border border-red-500/20 text-red-400 transition hidden sm:block">Exit</button>
          </div>
        </header>

        <div className="flex-1 flex overflow-hidden relative">
          {/* Main Canvas */}
          <main className="flex-1 bg-[#050507] flex items-center justify-center p-4">
            {image && (
              <div className="relative shadow-2xl rounded-xl overflow-hidden border border-white/10 max-w-full max-h-full">
                <canvas
                  ref={canvasRef}
                  className="max-w-full h-auto object-contain cursor-ew-resize block"
                  onMouseMove={(e) => e.buttons === 1 && handleDrag(e)}
                  onTouchMove={handleDrag}
                />
              </div>
            )}
          </main>

          {/* Desktop Sidebar */}
          <aside className="w-80 border-l border-white/5 bg-[#090a0d] p-4 hidden lg:flex flex-col gap-4 overflow-y-auto shrink-0">
            {/* Filters */}
            <div className="glass-panel rounded-lg p-4">
              <h3 className="text-xs font-bold text-gray-400 mb-3 uppercase">Filters</h3>
              <div className="grid grid-cols-2 gap-2">
                {Object.keys(FILTERS).map(f => (
                  <button
                    key={f}
                    onClick={() => applyFilter(f)}
                    className={`btn-action px-3 py-2 text-xs rounded-lg border transition ${selectedFilter === f ? 'bg-blue-600 border-blue-600 text-white' : 'bg-white/5 border-white/10 text-gray-400 hover:bg-white/10'}`}
                  >
                    {f}
                  </button>
                ))}
              </div>
            </div>

            {/* Adjustments */}
            <div className="glass-panel rounded-lg p-4">
              <h3 className="text-xs font-bold text-gray-400 mb-4 uppercase">Adjustments</h3>
              <Slider label="Exposure" value={adjustments.exposure} min={-2} max={2} step={0.01} onChange={(v) => updateAdjustment('exposure', v)} onCommit={commitHistory} unit="" />
              <Slider label="Contrast" value={adjustments.contrast} min={-1} max={1} step={0.01} onChange={(v) => updateAdjustment('contrast', v)} onCommit={commitHistory} unit="" />
              <Slider label="Saturation" value={adjustments.saturation} min={-1} max={1} step={0.01} onChange={(v) => updateAdjustment('saturation', v)} onCommit={commitHistory} unit="" />
              <Slider label="Highlights" value={adjustments.highlights} min={-1} max={1} step={0.01} onChange={(v) => updateAdjustment('highlights', v)} onCommit={commitHistory} unit="" />
              <Slider label="Shadows" value={adjustments.shadows} min={-1} max={1} step={0.01} onChange={(v) => updateAdjustment('shadows', v)} onCommit={commitHistory} unit="" />
            </div>

            {/* Color */}
            <div className="glass-panel rounded-lg p-4">
              <h3 className="text-xs font-bold text-gray-400 mb-4 uppercase">Color</h3>
              <Slider label="Warmth" value={adjustments.warmth} min={-1} max={1} step={0.01} onChange={(v) => updateAdjustment('warmth', v)} onCommit={commitHistory} unit="" />
              <Slider label="Tint" value={adjustments.tint} min={-1} max={1} step={0.01} onChange={(v) => updateAdjustment('tint', v)} onCommit={commitHistory} unit="" />
              <Slider label="Vibrancy" value={adjustments.vibrancy} min={-1} max={1} step={0.01} onChange={(v) => updateAdjustment('vibrancy', v)} onCommit={commitHistory} unit="" />
            </div>
          </aside>
        </div>

        {/* Mobile Bottom Sheet */}
        <div className={`lg:hidden fixed inset-x-0 bottom-0 z-40 glass-panel border-t border-white/5 rounded-t-2xl transition-transform duration-300 ${showMobilePanel ? 'translate-y-0' : 'translate-y-[calc(100%-56px)]'}`} style={{ paddingBottom: 'env(safe-area-inset-bottom)' }}>
          <div onClick={() => setShowMobilePanel(!showMobilePanel)} className="h-14 flex items-center justify-between px-4 cursor-pointer">
            <span className="text-xs font-bold text-gray-300 uppercase">{mobileTab === 'filter' ? 'Filters' : 'Adjust'}</span>
            <span className="text-gray-400">{showMobilePanel ? '✕' : '▲'}</span>
          </div>

          <div className="p-4 max-h-[50vh] overflow-y-auto space-y-4 bg-[#07080a]">
            {mobileTab === 'filter' ? (
              <div className="grid grid-cols-2 gap-2">
                {Object.keys(FILTERS).map(f => (
                  <button
                    key={f}
                    onClick={() => { applyFilter(f); setShowMobilePanel(false); }}
                    className={`btn-action px-3 py-3 text-xs rounded-lg border transition ${selectedFilter === f ? 'bg-blue-600 border-blue-600 text-white' : 'bg-white/5 border-white/10 text-gray-400 hover:bg-white/10'}`}
                  >
                    {f}
                  </button>
                ))}
              </div>
            ) : (
              <>
                <Slider label="Exposure" value={adjustments.exposure} min={-2} max={2} step={0.01} onChange={(v) => updateAdjustment('exposure', v)} onCommit={commitHistory} unit="" />
                <Slider label="Contrast" value={adjustments.contrast} min={-1} max={1} step={0.01} onChange={(v) => updateAdjustment('contrast', v)} onCommit={commitHistory} unit="" />
                <Slider label="Saturation" value={adjustments.saturation} min={-1} max={1} step={0.01} onChange={(v) => updateAdjustment('saturation', v)} onCommit={commitHistory} unit="" />
                <Slider label="Warmth" value={adjustments.warmth} min={-1} max={1} step={0.01} onChange={(v) => updateAdjustment('warmth', v)} onCommit={commitHistory} unit="" />
                <Slider label="Highlights" value={adjustments.highlights} min={-1} max={1} step={0.01} onChange={(v) => updateAdjustment('highlights', v)} onCommit={commitHistory} unit="" />
                <Slider label="Shadows" value={adjustments.shadows} min={-1} max={1} step={0.01} onChange={(v) => updateAdjustment('shadows', v)} onCommit={commitHistory} unit="" />
              </>
            )}
          </div>

          <nav className="h-14 border-t border-white/5 flex items-center justify-around bg-[#090a0d] shrink-0" style={{ paddingBottom: 'env(safe-area-inset-bottom)' }}>
            <button onClick={() => { setMobileTab('adjust'); setShowMobilePanel(true); }} className={`flex flex-col items-center gap-1 text-[10px] ${mobileTab === 'adjust' ? 'text-blue-500' : 'text-gray-400'}`}>
              <span className="text-lg">⚙</span>Adjust
            </button>
            <button onClick={() => { setMobileTab('filter'); setShowMobilePanel(true); }} className={`flex flex-col items-center gap-1 text-[10px] ${mobileTab === 'filter' ? 'text-blue-500' : 'text-gray-400'}`}>
              <span className="text-lg">✨</span>Filters
            </button>
            <button onClick={reset} className="flex flex-col items-center gap-1 text-[10px] text-gray-400">
              <span className="text-lg">🔄</span>Reset
            </button>
            <button onClick={onLogout} className="flex flex-col items-center gap-1 text-[10px] text-red-400">
              <span className="text-lg">✕</span>Exit
            </button>
          </nav>
        </div>
      </div>
    );
  };

  // ========== APP ==========
  const App = () => {
    const [user, setUser] = useState(null);
    return user ? (
      <PhotoEditor user={user} onLogout={() => setUser(null)} />
    ) : (
      <AuthGuard onAuthSuccess={setUser} />
    );
  };

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
