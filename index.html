<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Luminor Batch Studio | Pro Multi‑Image Editor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Inter', system-ui; background: #0A0C12; overflow-x: hidden; }
    .glass-panel { background: rgba(18, 22, 28, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.06); }
    .image-card { transition: transform 0.2s, box-shadow 0.2s; cursor: pointer; }
    .image-card.selected { border: 2px solid #FF5C00; box-shadow: 0 0 0 2px rgba(255,92,0,0.3); transform: scale(1.02); }
    .slider-neo { -webkit-appearance: none; background: transparent; }
    .slider-neo::-webkit-slider-runnable-track { height: 3px; background: rgba(255,255,255,0.12); border-radius: 6px; }
    .slider-neo::-webkit-slider-thumb { -webkit-appearance: none; height: 14px; width: 14px; border-radius: 50%; background: #FF5C00; margin-top: -5.5px; cursor: pointer; }
    .btn-glow:active { transform: scale(0.96); }
    @keyframes fadeSlide { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade { animation: fadeSlide 0.2s ease-out; }
  </style>
</head>
<body class="text-gray-200">

<div id="root"></div>

<script type="text/babel">
  const { useState, useEffect, useCallback, useRef } = React;

  // ---------- PRO AUTH SYSTEM (simple token) ----------
  const AuthGate = ({ onAuth }) => {
    const [email, setEmail] = useState('pro@luminor.com');
    const [password, setPassword] = useState('studio123');
    const [error, setError] = useState('');
    const handleSubmit = (e) => {
      e.preventDefault();
      if (email.trim() && password.length >= 4) {
        onAuth({ email, token: 'luminor_' + Date.now() });
      } else {
        setError('Valid email + password (min 4 chars)');
      }
    };
    return (
      <div className="fixed inset-0 bg-[#03050A] flex items-center justify-center z-50 p-4">
        <div className="absolute inset-0 bg-gradient-to-tr from-[#FF5C00]/10 via-transparent to-[#2F66F6]/10" />
        <div className="glass-panel rounded-2xl w-full max-w-md p-8 shadow-2xl border-white/10 animate-fade">
          <div className="flex items-center gap-2 mb-6">
            <div className="w-10 h-10 rounded-full bg-gradient-to-br from-[#FF5C00] to-[#FF8A3C] shadow-lg" />
            <h1 className="text-2xl font-bold tracking-tight bg-gradient-to-r from-white to-gray-300 bg-clip-text text-transparent">LUMINOR BATCH</h1>
          </div>
          <form onSubmit={handleSubmit} className="space-y-5">
            <div>
              <label className="text-[11px] font-mono text-gray-400 uppercase tracking-wider">Professional email</label>
              <input type="email" value={email} onChange={e => setEmail(e.target.value)} className="w-full mt-1 bg-black/40 border border-white/10 rounded-xl px-4 py-2.5 text-sm text-white focus:border-[#FF5C00] focus:ring-1 focus:ring-[#FF5C00]" />
            </div>
            <div>
              <label className="text-[11px] font-mono text-gray-400 uppercase tracking-wider">Access key</label>
              <input type="password" value={password} onChange={e => setPassword(e.target.value)} className="w-full mt-1 bg-black/40 border border-white/10 rounded-xl px-4 py-2.5 text-sm text-white" />
            </div>
            {error && <div className="text-red-400 text-xs">{error}</div>}
            <button type="submit" className="w-full bg-[#FF5C00] hover:bg-[#E05200] py-3 rounded-xl font-bold text-sm shadow-lg transition">⚡ Enter Studio</button>
          </form>
        </div>
      </div>
    );
  };

  // ---------- ADVANCED IMAGE PROCESSING (auto correction + presets) ----------
  function autoColorCorrect(imgData) {
    // Simple but effective auto levels + contrast boost
    const data = imgData.data;
    let minR = 255, maxR = 0, minG = 255, maxG = 0, minB = 255, maxB = 0;
    for (let i = 0; i < data.length; i += 4) {
      minR = Math.min(minR, data[i]); maxR = Math.max(maxR, data[i]);
      minG = Math.min(minG, data[i+1]); maxG = Math.max(maxG, data[i+1]);
      minB = Math.min(minB, data[i+2]); maxB = Math.max(maxB, data[i+2]);
    }
    const rangeR = maxR - minR || 1, rangeG = maxG - minG || 1, rangeB = maxB - minB || 1;
    for (let i = 0; i < data.length; i += 4) {
      data[i] = ((data[i] - minR) / rangeR) * 255;
      data[i+1] = ((data[i+1] - minG) / rangeG) * 255;
      data[i+2] = ((data[i+2] - minB) / rangeB) * 255;
      // slight contrast boost
      data[i] = Math.min(255, Math.max(0, (data[i] - 128) * 1.1 + 128));
      data[i+1] = Math.min(255, Math.max(0, (data[i+1] - 128) * 1.1 + 128));
      data[i+2] = Math.min(255, Math.max(0, (data[i+2] - 128) * 1.1 + 128));
    }
    return imgData;
  }

  function applyPresetToImageData(imgData, preset) {
    const data = imgData.data;
    const warmth = preset.warmth || 0;
    const sat = (preset.saturation || 0) / 100 + 1;
    const contrast = (preset.contrast || 0) + 1;
    for (let i = 0; i < data.length; i += 4) {
      let r = data[i], g = data[i+1], b = data[i+2];
      r = ((r / 255 - 0.5) * contrast + 0.5) * 255;
      g = ((g / 255 - 0.5) * contrast + 0.5) * 255;
      b = ((b / 255 - 0.5) * contrast + 0.5) * 255;
      r += warmth * 15; b -= warmth * 12;
      const gray = 0.299 * r + 0.587 * g + 0.114 * b;
      r = gray + (r - gray) * sat;
      g = gray + (g - gray) * sat;
      b = gray + (b - gray) * sat;
      data[i] = Math.min(255, Math.max(0, r));
      data[i+1] = Math.min(255, Math.max(0, g));
      data[i+2] = Math.min(255, Math.max(0, b));
    }
    return imgData;
  }

  const PRESETS = {
    'None': { warmth: 0, contrast: 0, saturation: 0 },
    'Warm Glow': { warmth: 0.4, contrast: 0.1, saturation: 15 },
    'Cool Air': { warmth: -0.3, contrast: 0.05, saturation: -5 },
    'Vivid Punch': { warmth: 0.1, contrast: 0.25, saturation: 30 },
    'Cinematic Fade': { warmth: -0.1, contrast: -0.15, saturation: -10 },
    'Auto Magic ✨': null // special case
  };

  // ---------- MAIN MULTI-IMAGE STUDIO ----------
  const BatchStudio = ({ session, onLogout }) => {
    const [images, setImages] = useState([]); // each: { id, file, originalUrl, processedBlob, thumbnail, selected, processedDataUrl }
    const [selectedIds, setSelectedIds] = useState(new Set());
    const [activePreset, setActivePreset] = useState('None');
    const [processing, setProcessing] = useState(false);
    const [applyToAll, setApplyToAll] = useState(false);
    const [autoCorrectToggle, setAutoCorrectToggle] = useState(false);
    const fileInputRef = useRef(null);

    // generate thumbnail from file
    const createThumbnail = (file, maxDim = 200) => {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            let w = img.width, h = img.height;
            if (w > h) { if (w > maxDim) { h = (h * maxDim) / w; w = maxDim; } }
            else { if (h > maxDim) { w = (w * maxDim) / h; h = maxDim; } }
            canvas.width = w; canvas.height = h;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, w, h);
            resolve(canvas.toDataURL('image/jpeg', 0.7));
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      });
    };

    const processImageToDataUrl = (file, applyAuto = false, preset = null) => {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            canvas.width = img.width; canvas.height = img.height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0);
            let imgData = ctx.getImageData(0, 0, img.width, img.height);
            if (applyAuto) imgData = autoColorCorrect(imgData);
            if (preset && PRESETS[preset]) {
              imgData = applyPresetToImageData(imgData, PRESETS[preset]);
            }
            ctx.putImageData(imgData, 0, 0);
            resolve(canvas.toDataURL('image/png'));
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      });
    };

    const handleUpload = async (files) => {
      if (!files.length) return;
      setProcessing(true);
      const newImages = [];
      for (const file of files) {
        const thumb = await createThumbnail(file);
        const processedDataUrl = await processImageToDataUrl(file, autoCorrectToggle, activePreset !== 'None' ? activePreset : null);
        newImages.push({
          id: Date.now() + '-' + Math.random(),
          file: file,
          originalUrl: URL.createObjectURL(file),
          thumbnail: thumb,
          processedDataUrl: processedDataUrl,
          selected: false
        });
      }
      setImages(prev => [...prev, ...newImages]);
      setProcessing(false);
    };

    const refreshAllPreviews = async () => {
      setProcessing(true);
      const updated = await Promise.all(images.map(async (img) => {
        const newDataUrl = await processImageToDataUrl(img.file, autoCorrectToggle, activePreset !== 'None' ? activePreset : null);
        return { ...img, processedDataUrl: newDataUrl };
      }));
      setImages(updated);
      setProcessing(false);
    };

    useEffect(() => {
      if (images.length && (autoCorrectToggle || activePreset !== 'None')) {
        refreshAllPreviews();
      }
    }, [autoCorrectToggle, activePreset]);

    const toggleSelect = (id) => {
      const newSet = new Set(selectedIds);
      if (newSet.has(id)) newSet.delete(id);
      else newSet.add(id);
      setSelectedIds(newSet);
    };

    const selectAll = () => {
      if (selectedIds.size === images.length) setSelectedIds(new Set());
      else setSelectedIds(new Set(images.map(i => i.id)));
    };

    const applyPresetToSelected = async (presetName) => {
      if (selectedIds.size === 0) return;
      setProcessing(true);
      const updated = await Promise.all(images.map(async (img) => {
        if (selectedIds.has(img.id)) {
          const newDataUrl = await processImageToDataUrl(img.file, autoCorrectToggle, presetName !== 'None' ? presetName : null);
          return { ...img, processedDataUrl: newDataUrl };
        }
        return img;
      }));
      setImages(updated);
      setProcessing(false);
      setActivePreset(presetName);
    };

    const autoCorrectSelected = async () => {
      if (selectedIds.size === 0) return;
      setProcessing(true);
      const updated = await Promise.all(images.map(async (img) => {
        if (selectedIds.has(img.id)) {
          const newDataUrl = await processImageToDataUrl(img.file, true, activePreset !== 'None' ? activePreset : null);
          return { ...img, processedDataUrl: newDataUrl };
        }
        return img;
      }));
      setImages(updated);
      setProcessing(false);
    };

    const exportSelected = async () => {
      const toExport = images.filter(img => selectedIds.has(img.id));
      if (toExport.length === 0) return;
      if (toExport.length === 1) {
        const link = document.createElement('a');
        link.download = `luminor_${toExport[0].id}.png`;
        link.href = toExport[0].processedDataUrl;
        link.click();
      } else {
        const zip = new JSZip();
        for (const img of toExport) {
          const base64 = img.processedDataUrl.split(',')[1];
          zip.file(`image_${img.id}.png`, base64, { base64: true });
        }
        const content = await zip.generateAsync({ type: 'blob' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(content);
        link.download = 'luminor_batch_export.zip';
        link.click();
        URL.revokeObjectURL(link.href);
      }
    };

    const deleteSelected = () => {
      setImages(prev => prev.filter(img => !selectedIds.has(img.id)));
      setSelectedIds(new Set());
    };

    return (
      <div className="min-h-screen bg-[#05070A] flex flex-col">
        {/* Header */}
        <header className="sticky top-0 z-30 glass-panel border-b border-white/5 px-5 py-3 flex flex-wrap items-center justify-between gap-3">
          <div className="flex items-center gap-3">
            <div className="w-8 h-8 rounded-full bg-gradient-to-br from-[#FF5C00] to-[#FF8A3C]" />
            <span className="font-bold text-sm tracking-tight">LUMINOR BATCH STUDIO</span>
            <span className="text-[10px] font-mono bg-white/10 px-2 py-0.5 rounded-full">{images.length} assets</span>
          </div>
          <div className="flex flex-wrap items-center gap-3">
            <button onClick={() => fileInputRef.current.click()} className="bg-white/10 hover:bg-white/20 text-xs font-bold px-4 py-2 rounded-full transition">📤 Upload multiple</button>
            <input type="file" ref={fileInputRef} multiple accept="image/jpeg,image/png,image/webp" className="hidden" onChange={(e) => handleUpload(Array.from(e.target.files))} />
            <label className="flex items-center gap-2 text-xs"><input type="checkbox" checked={autoCorrectToggle} onChange={e => setAutoCorrectToggle(e.target.checked)} className="accent-[#FF5C00]" /> Auto‑correct (AI levels)</label>
            <button onClick={exportSelected} disabled={selectedIds.size === 0} className="bg-[#FF5C00] hover:bg-[#E05200] disabled:opacity-40 text-xs font-bold px-5 py-2 rounded-full transition">📦 Export {selectedIds.size} selected</button>
            <button onClick={onLogout} className="text-xs border border-white/20 px-3 py-1.5 rounded-full hover:bg-white/5">Exit</button>
          </div>
        </header>

        <div className="flex flex-col lg:flex-row gap-6 p-6 max-w-7xl mx-auto w-full">
          {/* LEFT: Control Panel */}
          <div className="lg:w-72 space-y-5 glass-panel rounded-2xl p-5 h-fit sticky top-20">
            <h2 className="text-xs font-black uppercase tracking-wider text-[#FF5C00]">Batch operations</h2>
            <div>
              <label className="text-[10px] text-gray-400">Apply preset to selected images</label>
              <select value={activePreset} onChange={e => setActivePreset(e.target.value)} className="w-full mt-1 bg-black/50 border border-white/10 rounded-xl p-2 text-sm">
                {Object.keys(PRESETS).map(p => <option key={p}>{p}</option>)}
              </select>
            </div>
            <div className="flex gap-2 flex-wrap">
              <button onClick={() => applyPresetToSelected(activePreset)} disabled={selectedIds.size === 0} className="bg-white/10 hover:bg-white/20 text-xs py-2 px-3 rounded-xl">✨ Apply preset</button>
              <button onClick={autoCorrectSelected} disabled={selectedIds.size === 0} className="bg-white/10 hover:bg-white/20 text-xs py-2 px-3 rounded-xl">🌀 Auto correct</button>
              <button onClick={selectAll} className="bg-white/5 text-xs py-2 px-3 rounded-xl">✔️ Select all</button>
              <button onClick={deleteSelected} disabled={selectedIds.size === 0} className="bg-red-500/20 text-red-300 text-xs py-2 px-3 rounded-xl">🗑 Delete</button>
            </div>
            <hr className="border-white/10" />
            <div className="text-[10px] text-gray-400 space-y-1">
              <p>⚡ Pro features: multi‑select, auto color correction, batch presets, ZIP export.</p>
              <p>🎨 Click any thumbnail to select. Use shift+click for range (simple multi).</p>
            </div>
          </div>

          {/* RIGHT: Grid of images */}
          <div className="flex-1">
            {processing && <div className="bg-black/50 text-center py-2 rounded-full text-xs mb-4">⏳ Processing images...</div>}
            {images.length === 0 ? (
              <div className="glass-panel rounded-2xl p-12 text-center border-dashed border-2 border-white/10">
                <div className="text-5xl mb-3">🖼️</div>
                <p className="text-gray-400 text-sm">Upload multiple images (JPG, PNG, WebP)</p>
                <button onClick={() => fileInputRef.current.click()} className="mt-4 bg-[#FF5C00] px-6 py-2 rounded-full text-sm font-bold">Start batch</button>
              </div>
            ) : (
              <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-5">
                {images.map(img => (
                  <div key={img.id} onClick={() => toggleSelect(img.id)} className={`image-card rounded-xl overflow-hidden glass-panel transition-all ${selectedIds.has(img.id) ? 'selected' : ''}`}>
                    <div className="relative aspect-square bg-black/40">
                      <img src={img.processedDataUrl} alt="preview" className="w-full h-full object-cover" />
                      {selectedIds.has(img.id) && <div className="absolute top-2 right-2 w-6 h-6 rounded-full bg-[#FF5C00] flex items-center justify-center text-xs font-bold shadow">✓</div>}
                    </div>
                    <div className="p-2 text-[10px] flex justify-between items-center">
                      <span className="truncate">{img.file.name.substring(0, 20)}</span>
                      <span className="text-gray-400">{Math.round(img.file.size / 1024)}kb</span>
                    </div>
                  </div>
                ))}
              </div>
            )}
            {images.length > 0 && (
              <div className="mt-6 text-center text-[11px] text-gray-500">
                ✅ {selectedIds.size} selected | Total {images.length} images | Click to toggle selection
              </div>
            )}
          </div>
        </div>
      </div>
    );
  };

  // Root
  const App = () => {
    const [user, setUser] = useState(() => {
      const saved = localStorage.getItem('luminor_batch_user');
      return saved ? JSON.parse(saved) : null;
    });
    return user ? <BatchStudio session={user} onLogout={() => { setUser(null); localStorage.removeItem('luminor_batch_user'); }} /> : <AuthGate onAuth={(data) => { setUser(data); localStorage.setItem('luminor_batch_user', JSON.stringify(data)); }} />;
  };

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
